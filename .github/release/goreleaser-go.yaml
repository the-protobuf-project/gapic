version: 2
project_name: protoc-gen-go_gapic

# Monorepo mode: this aggregator holds several plugins, each released under its
# own namespaced tag. The Go plugin uses tags like `go-v0.62.0`; tag_prefix
# strips `go-` so {{.Version}} == 0.62.0, and `dir` makes builds/archives/files
# resolve relative to the gapic-go submodule.
monorepo:
  tag_prefix: go-
  dir: gapic-go

builds:
  - id: protoc-gen-go_gapic
    binary: protoc-gen-go_gapic
    main: ./cmd/protoc-gen-go_gapic # relative to monorepo.dir (gapic-go)
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w

archives:
  - id: protoc-gen-go_gapic-archive
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE
      - README.md
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: '{{ incpatch .Version }}-next'

changelog:
  disable: true # upstream-driven; we mirror versions, not author changelogs

# Homebrew FORMULA (not a cask) committed to the tap on each release. A formula
# works on both macOS and Linux (Linuxbrew); goreleaser auto-emits per-OS /
# per-arch (darwin+linux x amd64+arm64) blocks with url + sha256 filled in from
# the archives above. (A cask would be macOS-only — hence formula.)
brews:
  - name: protoc-gen-go-gapic # formula tokens use hyphens; binary keeps underscore
    repository:
      owner: the-protobuf-project
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Formula
    homepage: 'https://github.com/the-protobuf-project/gapic'
    description: 'GAPIC protoc plugin for Go (protoc-gen-go_gapic), redistributed from googleapis/gapic-generator-go'
    license: 'Apache-2.0'
    ids:
      - protoc-gen-go_gapic-archive
    install: |
      bin.install "protoc-gen-go_gapic"
    test: |
      assert_predicate bin/"protoc-gen-go_gapic", :executable?

# Windows: amd64/arm64 zips are already on the GitHub Release. This optional
# Scoop manifest gives Windows users a native installer. It self-disables unless
# SCOOP_BUCKET_GITHUB_TOKEN is set, so releases never break if you skip Windows.
scoops:
  - disable: '{{ if isEnvSet "SCOOP_BUCKET_GITHUB_TOKEN" }}false{{ else }}true{{ end }}'
    name: protoc-gen-go_gapic
    repository:
      owner: the-protobuf-project
      name: scoop-bucket
      token: '{{ envOrDefault "SCOOP_BUCKET_GITHUB_TOKEN" "" }}'
    directory: bucket
    homepage: 'https://github.com/the-protobuf-project/gapic'
    description: 'GAPIC protoc plugin for Go (protoc-gen-go_gapic)'
    license: 'Apache-2.0'
    ids:
      - protoc-gen-go_gapic-archive

release:
  # Defaults to the current repository (the aggregator); no owner/name override.
  draft: false
  prerelease: auto
  name_template: 'protoc-gen-go_gapic {{ .Version }}'
  header: |
    ## protoc-gen-go_gapic {{ .Version }}

    GAPIC code generator plugin for Go, redistributed from
    [googleapis/gapic-generator-go](https://github.com/googleapis/gapic-generator-go)
    at upstream version {{ .Version }}. Download the binary for your platform below.

    ### Install (Homebrew)
    ```bash
    brew install the-protobuf-project/tap/protoc-gen-go-gapic
    ```
