name: Release Node/TS plugin

on:
  push:
    tags: ['ts-v*']

permissions:
  contents: write

env:
  GEN_DIR: gapic-node/core/generator/gapic-generator-typescript

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Resolve version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#ts-v}" >>"$GITHUB_OUTPUT"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build generator
        working-directory: ${{ env.GEN_DIR }}
        run: |
          npm ci
          npm run compile
          test -f build/typescript/src/protoc-plugin.js
          # Drop dev deps so the bundled node_modules is runtime-only.
          npm prune --omit=dev

      - name: Stage self-contained tarball
        id: pack
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          NAME="protoc-gen-typescript_gapic"
          STAGE="$RUNNER_TEMP/${NAME}-${VERSION}"
          mkdir -p "$STAGE"
          # build/ already contains compiled JS + copied templates/ and protos/.
          cp -R "${GEN_DIR}/build" "$STAGE/build"
          cp -R "${GEN_DIR}/node_modules" "$STAGE/node_modules"
          cp "${GEN_DIR}/package.json" "$STAGE/package.json"
          cp "${GEN_DIR}/LICENSE" "$STAGE/LICENSE" 2>/dev/null || true
          TARBALL="${NAME}_${VERSION}.tar.gz"
          tar -C "$RUNNER_TEMP" -czf "$TARBALL" "${NAME}-${VERSION}"
          SHA=$(shasum -a 256 "$TARBALL" | awk '{print $1}')
          echo "tarball=$TARBALL" >>"$GITHUB_OUTPUT"
          echo "sha256=$SHA" >>"$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "$GITHUB_REF_NAME" \
            --title "protoc-gen-typescript_gapic ${VERSION}" \
            --notes "GAPIC code generator plugin for TypeScript/Node, redistributed from googleapis/gapic-generator-typescript (vendored in google-cloud-node) at upstream version ${VERSION}.

          ### Install (Homebrew)
          \`\`\`bash
          brew install the-protobuf-project/tap/protoc-gen-typescript-gapic
          \`\`\`" \
            "${{ steps.pack.outputs.tarball }}"

      - name: Publish Homebrew formula to tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          SHA256: ${{ steps.pack.outputs.sha256 }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          set -euo pipefail
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${TARBALL}"
          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/the-protobuf-project/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cat > tap/Formula/protoc-gen-typescript-gapic.rb <<EOF
          class ProtocGenTypescriptGapic < Formula
            desc "GAPIC protoc plugin for TypeScript/Node (protoc-gen-typescript_gapic)"
            homepage "https://github.com/the-protobuf-project/gapic"
            url "${URL}"
            sha256 "${SHA256}"
            license "Apache-2.0"
            version "${VERSION}"

            depends_on "node"

            def install
              libexec.install Dir["*"]
              (bin/"protoc-gen-typescript_gapic").write <<~SH
                #!/bin/bash
                exec "#{Formula["node"].opt_bin}/node" "#{libexec}/build/typescript/src/protoc-plugin.js" "\$@"
              SH
            end

            test do
              assert_predicate bin/"protoc-gen-typescript_gapic", :executable?
            end
          end
          EOF
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/protoc-gen-typescript-gapic.rb
          git commit -m "protoc-gen-typescript-gapic ${VERSION}" || { echo "no change"; exit 0; }
          git push
